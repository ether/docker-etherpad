name: Build

# Multi-arch buildx CI for ether/docker-etherpad. LSIO's Jenkinsfile
# is also present in the repo but only runs once the project is
# adopted into the linuxserver/ org. Until then this workflow keeps
# the image building and pushing to GHCR on every commit + tag.

on:
  push:
    branches: [main]
    tags: ["v?[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
  workflow_dispatch:
    inputs:
      etherpad_version:
        description: "Etherpad tag to build (e.g. v3.0.0). Leave empty to use latest release."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  # Per-arch builds run on native runners (GitHub provides free
  # ubuntu-24.04-arm for public repos as of Jan 2025).  This avoids
  # QEMU translation of Node/V8 SIMD ops, which crashes with SIGILL
  # during `pnpm install` / `pnpm run build:etherpad`.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            dockerfile: Dockerfile
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: Dockerfile.aarch64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    outputs:
      etherpad_version: ${{ steps.ver.outputs.etherpad_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Etherpad version
        id: ver
        run: |
          ver="${{ github.event.inputs.etherpad_version }}"
          if [ -z "${ver}" ]; then
            ver=$(curl -sf "https://api.github.com/repos/ether/etherpad/releases/latest" | jq -r .tag_name)
          fi
          echo "etherpad_version=${ver}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute per-arch tags
        id: tags
        run: |
          repo="ghcr.io/ether/etherpad-lsio"
          ver="${{ steps.ver.outputs.etherpad_version }}"
          bases="${repo}:${ver}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bases="${bases} ${repo}:latest"
          fi
          tags=$(printf "%s-${{ matrix.arch }}," ${bases} | sed 's/,$//')
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.arch }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            ETHERPAD_VERSION=${{ steps.ver.outputs.etherpad_version }}
            VERSION=${{ steps.ver.outputs.etherpad_version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose multi-arch manifest
        run: |
          repo="ghcr.io/ether/etherpad-lsio"
          ver="${{ needs.build.outputs.etherpad_version }}"
          bases="${repo}:${ver}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bases="${bases} ${repo}:latest"
          fi
          for base in ${bases}; do
            docker buildx imagetools create -t "${base}" \
              "${base}-amd64" "${base}-arm64"
          done
