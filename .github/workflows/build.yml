name: Build

# Multi-arch buildx CI for ether/docker-etherpad. LSIO's Jenkinsfile
# is also present in the repo but only runs once the project is
# adopted into the linuxserver/ org. Until then this workflow keeps
# the image building and pushing to GHCR on every commit + tag.

on:
  push:
    branches: [main]
    tags: ["v?[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
  workflow_dispatch:
    inputs:
      etherpad_version:
        description: "Etherpad tag to build (e.g. v3.0.0). Leave empty to use latest release."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve Etherpad version
        id: ver
        run: |
          ver="${{ github.event.inputs.etherpad_version }}"
          if [ -z "${ver}" ]; then
            ver=$(curl -sf "https://api.github.com/repos/ether/etherpad/releases/latest" | jq -r .tag_name)
          fi
          echo "etherpad_version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Building Etherpad ${ver}"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          repo="ghcr.io/ether/etherpad-lsio"
          ver="${{ steps.ver.outputs.etherpad_version }}"
          tags="${repo}:${ver}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="${tags},${repo}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            ETHERPAD_VERSION=${{ steps.ver.outputs.etherpad_version }}
            VERSION=${{ steps.ver.outputs.etherpad_version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}-amd64

      - name: Build arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.aarch64
          platforms: linux/arm64
          build-args: |
            ETHERPAD_VERSION=${{ steps.ver.outputs.etherpad_version }}
            VERSION=${{ steps.ver.outputs.etherpad_version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}-arm64

      - name: Create multi-arch manifest
        if: github.event_name != 'pull_request'
        run: |
          for tag in $(echo "${{ steps.tags.outputs.tags }}" | tr ',' ' '); do
            docker buildx imagetools create -t "${tag}" \
              "${tag}-amd64" "${tag}-arm64"
          done
