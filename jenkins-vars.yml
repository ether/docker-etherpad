---

# jenkins variables — wired up for the LSIO Jenkins template scripts.
# These won't fire under ether/* (no LSIO Jenkins access), but they're
# kept here so that adoption into the linuxserver/ org is a rename
# rather than a rewrite.
project_name: docker-etherpad
external_type: github_stable
release_type: stable
release_tag: latest
ls_branch: main
repo_vars:
  - EXT_GIT_BRANCH = 'main'
  - EXT_USER = 'ether'
  - EXT_REPO = 'etherpad'
  - CONTAINER_NAME = 'etherpad'
  - BUILD_VERSION_ARG = 'ETHERPAD_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-etherpad'
  - DOCKERHUB_IMAGE = 'linuxserver/etherpad'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/etherpad'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/etherpad'
  - DIST_IMAGE = 'alpine'
  - MULTIARCH='true'
  - CI='true'
  - CI_WEB='true'
  - CI_PORT='9001'
  - CI_SSL='false'
  - CI_DELAY='120'
  - CI_DOCKERENV=''
  - CI_AUTH=''
  - CI_WEBPATH=''
